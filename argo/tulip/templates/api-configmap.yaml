    import os
    from pathlib import Path

    traffic_dir = Path(os.getenv("TULIP_TRAFFIC_DIR", "/traffic"))
    dump_pcaps_dir = Path(os.getenv("DUMP_PCAPS", "/traffic"))
    tick_length = os.getenv("TICK_LENGTH", 2*60*1000)
    flag_lifetime = os.getenv("FLAG_LIFETIME", 5)
    start_date = os.getenv("TICK_START", "2025-11-08T13:00:00+00:00")
    flag_regex = "SAAR\{[A-Za-z0-9_-]{32}\}"
    vm_ip = os.getenv("VM_IP", "10.32.135.2")
    visualizer_url = os.getenv("VISUALIZER_URL", "http://127.0.0.1:1337")

    vm_ip_1 = "10.32.135.2"
    helper = '''
    10.32.135.2:443 routerploit
    10.32.135.2:8082 sssg
    10.32.135.2:1337 blockrope
    10.32.135.2:4711 blockrope2, socat
    10.32.135.2:8086 caddy?
    10.32.135.2:8081 apache?
    10.32.135.2:1835 rceaas
    10.32.135.2:12935 licenser
    10.32.135.2:51349 saarlandcryptogalore
    10.32.135.2:6666 calendar?
    '''

    services = [{"ip": x.split(" ")[0].rsplit(':', 1)[0], "port": int(x.split(" ")[0].rsplit(':', 1)[1]), "name": " ".join(x.split(" ")[1:])} for x in helper.strip().split("\n")]
    services += [{"ip": vm_ip_1, "port": -1, "name": "other"}]
