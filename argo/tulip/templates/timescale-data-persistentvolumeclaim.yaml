apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  labels:
    io.kompose.service: timescale-data
  name: timescale-data
  namespace: tulip
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: hcloud-volumes
  resources:
    # PVC capacity is provisioned from requests.storage. Keep the historical
    # limit for existing bound PVCs, where removing it is immutable.
    limits:
      storage: 40G
    requests:
      storage: 100Gi
