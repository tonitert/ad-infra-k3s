apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.yaml
    kompose.version: 1.36.0 (ae2a39403)
    org.opencontainers.image.source: https://github.com/tonitert/ad-infra-k3s
  labels:
    io.kompose.service: assembler
  name: assembler
  namespace: tulip
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: assembler
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f docker-compose.yaml
        kompose.version: 1.36.0 (ae2a39403)
        org.opencontainers.image.source: https://github.com/tonitert/ad-infra-k3s
      labels:
        io.kompose.service: assembler
    spec:
      containers:
        - args:
            - ./assembler
            - -http-session-tracking
            - -skipchecksum
            - -disable-converters
            - -dir
            - /traffic
          envFrom:
            - configMapRef:
                name: tulip-config
          image: ghcr.io/tonitert/ad-infra-k3s/tulip-assembler:latest
          name: assembler
          volumeMounts:
            - mountPath: /traffic
              name: traffic
              readOnly: true
      restartPolicy: Always
      volumes:
        - name: traffic
          persistentVolumeClaim:
            claimName: traffic
            readOnly: true
