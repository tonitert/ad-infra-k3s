apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.yaml
    kompose.version: 1.36.0 (ae2a39403)
    org.opencontainers.image.source: https://github.com/tonitert/ad-infra-k3s
  labels:
    io.kompose.service: flagids
  name: flagids
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: flagids
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f docker-compose.yaml
        kompose.version: 1.36.0 (ae2a39403)
        org.opencontainers.image.source: https://github.com/tonitert/ad-infra-k3s
      labels:
        io.kompose.service: flagids
    spec:
      containers:
        - envFrom:
            - configMapRef:
                name: tulip-config
          image: ghcr.io/tonitert/ad-infra-k3s/tulip-flagids:latest
          name: flagids
      restartPolicy: Always
