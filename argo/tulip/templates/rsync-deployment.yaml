apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    io.kompose.service: rsync
  name: rsync
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: rsync
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        io.kompose.service: rsync
    spec:
      # Init container to set proper SSH key permissions
      initContainers:
        - name: ssh-key-permissions
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              # Create .ssh directory and set permissions
              mkdir -p /root/.ssh
              chmod 700 /root/.ssh
              # Copy SSH keys and set proper permissions
              cp /tmp/ssh-keys/* /root/.ssh/ 2>/dev/null || true
              chmod 600 /root/.ssh/id_rsa 2>/dev/null || true
              chmod 644 /root/.ssh/id_rsa.pub 2>/dev/null || true
              chmod 644 /root/.ssh/known_hosts 2>/dev/null || true
              ls -la /root/.ssh/
          volumeMounts:
            - mountPath: /tmp/ssh-keys
              name: ssh-key
              readOnly: true
            - mountPath: /root/.ssh
              name: ssh-key-storage
      containers:
        - env:
            # Cron task for periodic rsync - this is how eeacms/rsync actually works
            - name: CRON_TASK_1
              value: "*/5 * * * * rsync -e 'ssh -i /root/.ssh/id_rsa -o StrictHostKeyChecking=no -o UserKnownHostsFile=/root/.ssh/known_hosts' -avz --delete --stats root@168.119.122.165:/pcaps/ /traffic/"
            # SSH configuration for secure rsync  
            - name: RSYNC_RSH
              value: "ssh -i /root/.ssh/id_rsa -o StrictHostKeyChecking=no -o UserKnownHostsFile=/root/.ssh/known_hosts"
          image: eeacms/rsync:latest
          name: rsync
          # Run in client mode to execute cron tasks
          args: ["client"]
          volumeMounts:
            - mountPath: /traffic
              name: traffic
              readOnly: false
            # Mount SSH directory prepared by init container
            - mountPath: /root/.ssh
              name: ssh-key-storage
          # Add resource limits to prevent excessive resource usage
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "100m"
              memory: "128Mi"
      restartPolicy: Always
      volumes:
        - name: traffic
          persistentVolumeClaim:
            claimName: traffic
            readOnly: false
        - name: ssh-key
          secret:
            secretName: rsync-ssh-key
            defaultMode: 0600
        - name: ssh-key-storage
          emptyDir: {}