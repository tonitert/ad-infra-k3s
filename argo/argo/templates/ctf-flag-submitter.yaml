apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ctf-flag-submitter
spec:
  project: default
  source:
    path: argo/ctf-flag-submitter
    repoURL: '{{ .Values.repoUrl }}'
    targetRevision: {{ .Values.branch }}
  destination:
    namespace: ctf-flag-submitter
    server: "https://kubernetes.default.svc"
  syncPolicy:
    syncOptions:
    - CreateNamespace=true
    automated:
      prune: true