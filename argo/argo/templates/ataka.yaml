apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ataka
spec:
  project: default
  source:
    path: argo/ataka
    repoURL: '{{ .Values.repoUrl }}'
    targetRevision: "feat/add-ataka"
  destination:
    namespace: ataka
    server: "https://kubernetes.default.svc"
  syncPolicy:
    syncOptions:
    - CreateNamespace=true
    automated:
      prune: true