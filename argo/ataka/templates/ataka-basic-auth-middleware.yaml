{{- $ingress := .Values.ingress | default dict -}}
{{- $basicAuth := get $ingress "basicAuth" | default dict -}}
{{- $basicAuthEnabled := true -}}
{{- if hasKey $basicAuth "enabled" -}}
{{- $basicAuthEnabled = get $basicAuth "enabled" -}}
{{- end -}}
{{- if (get $ingress "enabled" | default false) }}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: ataka-api-normalize-path
  namespace: ataka
spec:
  replacePathRegex:
    regex: ^/api/(exploit|exploit_history|job|targets)$
    replacement: /api/${1}/
{{- if $basicAuthEnabled }}
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: ataka-basic-auth
  namespace: ataka
spec:
  basicAuth:
    secret: ataka-basic-auth
    realm: "Ataka"
    removeHeader: true
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: ataka-middleware-chain
  namespace: ataka
spec:
  chain:
    middlewares:
      - name: ataka-basic-auth
      - name: ataka-api-normalize-path
{{- end }}
{{- end }}
