apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f ../../apps/ataka/docker-compose.yml -c --generate-network-policies
    kompose.hpa.cpu: 40%
    kompose.hpa.replicas.max: "3"
    kompose.hpa.replicas.min: "1"
    kompose.version: 1.36.0 (ae2a39403)
  labels:
    io.kompose.service: executor
  name: executor
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: executor
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f ../../apps/ataka/docker-compose.yml -c --generate-network-policies
        kompose.hpa.cpu: 40%
        kompose.hpa.replicas.max: "3"
        kompose.hpa.replicas.min: "1"
        kompose.version: 1.36.0 (ae2a39403)
      labels:
        io.kompose.network/ataka-ataka: "true"
        io.kompose.service: executor
    spec:
      containers:
        - envFrom:
            - configMapRef:
                name: env
          image: ghcr.io/tonitert/ad-infra-k3s/ataka-executor:latest
          name: executor
          securityContext:
            runAsGroup: 966
            runAsUser: 1000
          volumeMounts:
            - mountPath: /data/shared
              name: shared
            - mountPath: /data/exploits
              name: exploits
            - mountPath: /data/persist
              name: persists
          resources:
            requests:
              cpu: 500m
              memory: 256Mi
      hostname: ataka-executor
      restartPolicy: Always
      volumes:
        - name: shared
          persistentVolumeClaim:
            claimName: shared
        - name: exploits
          persistentVolumeClaim:
            claimName: exploits
        - name: persists
          persistentVolumeClaim:
            claimName: persists
      
