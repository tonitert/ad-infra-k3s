apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f ../../apps/ataka/docker-compose.yml -c --generate-network-policies
    kompose.hpa.cpu: 40%
    kompose.hpa.replicas.max: "3"
    kompose.hpa.replicas.min: "1"
    kompose.version: 1.36.0 (ae2a39403)
  labels:
    io.kompose.service: executor
  name: executor
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: executor
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f ../../apps/ataka/docker-compose.yml -c --generate-network-policies
        kompose.hpa.cpu: 40%
        kompose.hpa.replicas.max: "3"
        kompose.hpa.replicas.min: "1"
        kompose.version: 1.36.0 (ae2a39403)
      labels:
        io.kompose.network/ataka-ataka: "true"
        io.kompose.service: executor
    spec:
      initContainers:
        - image: docker:28.4.0-dind
          name: dind
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
          restartPolicy: Always
          securityContext:
            privileged: true
            runAsGroup: 0
            runAsUser: 0
          ports:
            - containerPort: 2375
              protocol: TCP
          volumeMounts:
            - mountPath: /data/shared
              name: shared
            - mountPath: /data/exploits
              name: exploits
            - mountPath: /data/persist
              name: persists
          resources:
            requests:
              cpu: 500m
              memory: 256Mi
      containers:
        - envFrom:
            - secretRef:
                name: ataka-env-secret
          env: 
            - name: DOCKER_HOST
              value: tcp://localhost:2375
          image: ghcr.io/tonitert/ad-infra-k3s/ataka-executor:latest
          name: executor
          command:
            - sh
            - -c
            - |
              mkdir -p /data/shared/exploits /data/persist
              until docker version >/dev/null 2>&1; do sleep 1; done
              docker rm -f ataka-exploit >/dev/null 2>&1 || true
              docker run -d --name ataka-exploit busybox:1.36 sleep infinity
              exec sh /ataka/common/delayed_start.sh -- python -m ataka.executor
          securityContext:
            runAsGroup: 966
            runAsUser: 1000
          volumeMounts:
            - mountPath: /data/shared
              name: shared
            - mountPath: /data/exploits
              name: exploits
            - mountPath: /data/persist
              name: persists
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
      hostname: ataka-executor
      restartPolicy: Always
      volumes:
        - name: shared
          persistentVolumeClaim:
            claimName: shared
        - name: exploits
          persistentVolumeClaim:
            claimName: exploits
        - name: persists
          persistentVolumeClaim:
            claimName: persists
      
