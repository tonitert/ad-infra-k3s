apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f ../../apps/ataka/docker-compose.yml -c --generate-network-policies
    kompose.version: 1.36.0 (ae2a39403)
  labels:
    io.kompose.service: ctfcode
  name: ctfcode
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: ctfcode
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f ../../apps/ataka/docker-compose.yml -c --generate-network-policies
        kompose.version: 1.36.0 (ae2a39403)
      labels:
        io.kompose.network/ataka-ataka: "true"
        io.kompose.service: ctfcode
    spec:
      containers:
        - envFrom:
            - secretRef:
                name: env
          image: ghcr.io/tonitert/ad-infra-k3s/ataka-ctfcode:latest
          name: ctfcode
          securityContext:
            runAsGroup: 966
            runAsUser: 1000
          volumeMounts:
            - mountPath: /ataka/ctfconfig
              name: ctfcode-cm0
              readOnly: true
            - mountPath: /ataka/player-cli
              name: ctfcode-cm1
              readOnly: true
            - mountPath: /data/shared
              name: shared
      hostname: ataka-ctfcode
      restartPolicy: Always
      volumes:
        - configMap:
            name: ctfcode-cm0
          name: ctfcode-cm0
        - configMap:
            name: ctfcode-cm1
          name: ctfcode-cm1
        - name: shared
          persistentVolumeClaim:
            claimName: shared
