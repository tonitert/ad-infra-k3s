{{- $openvpn := .Values.openvpn | default dict -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f ../../apps/ataka/docker-compose.yml -c --generate-network-policies
    kompose.version: 1.36.0 (ae2a39403)
  labels:
    io.kompose.service: ctfcode
  name: ctfcode
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: ctfcode
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f ../../apps/ataka/docker-compose.yml -c --generate-network-policies
        kompose.version: 1.36.0 (ae2a39403)
      labels:
        io.kompose.network/ataka-ataka: "true"
        io.kompose.service: ctfcode
    spec:
      containers:
{{- if (get $openvpn "enabled" | default false) }}
        # OpenVPN client sidecar container
        - name: openvpn-client
          image: dperson/openvpn-client
          securityContext:
            privileged: true
            capabilities:
              add:
                - NET_ADMIN
          env: 
            - name: VPN_FILES
              value: "vpn.conf"
          volumeMounts:
            - name: openvpn-config
              mountPath: /vpn
              readOnly: true
            - name: dev-net-tun
              mountPath: /dev/net/tun
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
{{- end }}
        # Main application container
        - envFrom:
            - secretRef:
                name: ataka-env-secret
          image: ghcr.io/tonitert/ad-infra-k3s/ataka-ctfcode:latest
          imagePullPolicy: Always
          name: ctfcode
          # Share network with OpenVPN sidecar for VPN routing

          securityContext:
            runAsGroup: 966
            runAsUser: 1000
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - mountPath: /data/shared
              name: shared
      hostname: ataka-ctfcode
      restartPolicy: Always
      volumes:
        - name: shared
          persistentVolumeClaim:
            claimName: shared
{{- if (get $openvpn "enabled" | default false) }}
        # OpenVPN configuration volume
        - name: openvpn-config
          secret:
            secretName: openvpn-config
        # TUN device for VPN
        - name: dev-net-tun
          hostPath:
            path: /dev/net/tun
            type: CharDevice
{{- end }}
