{{- $openvpn := .Values.openvpn | default dict -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f ../../apps/ataka/docker-compose.yml -c --generate-network-policies
    kompose.version: 1.36.0 (ae2a39403)
  labels:
    io.kompose.service: ctfcode
  name: ctfcode
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: ctfcode
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f ../../apps/ataka/docker-compose.yml -c --generate-network-policies
        kompose.version: 1.36.0 (ae2a39403)
      labels:
        io.kompose.network/ataka-ataka: "true"
        io.kompose.service: ctfcode
    spec:
      containers:
{{- if (get $openvpn "enabled" | default false) }}
        # OpenVPN client sidecar container
        - name: openvpn-client
          image: dperson/openvpn-client
          securityContext:
            privileged: true
            capabilities:
              add:
                - NET_ADMIN
          env: 
            - name: VPN_FILES
              value: "vpn.conf"
          volumeMounts:
            - name: openvpn-config
              mountPath: /vpn
              readOnly: true
            - name: dev-net-tun
              mountPath: /dev/net/tun
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
{{- end }}
        # Main application container
        - envFrom:
            - secretRef:
                name: ataka-env-secret
          image: ghcr.io/tonitert/ad-infra-k3s/ataka-ctfcode:latest
          name: ctfcode
          # Share network with OpenVPN sidecar for VPN routing

          securityContext:
            runAsGroup: 966
            runAsUser: 1000
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - mountPath: /ataka/ctfconfig
              name: ctfcode-cm0
              readOnly: true
            - mountPath: /ataka/player-cli
              name: ctfcode-cm1
            - mountPath: /data/shared
              name: shared
      hostname: ataka-ctfcode
      restartPolicy: Always
      volumes:
        - configMap:
            name: ctfcode-cm0
          name: ctfcode-cm0
        - configMap:
            name: ctfcode-cm1
            defaultMode: 0555
            items:
              - key: .gitignore
                path: .gitignore
              - key: __main__.py
                path: __main__.py
              - key: package_player_cli.sh
                path: package_player_cli.sh
              - key: requirements.txt
                path: requirements.txt
              - key: player_cli____init__.py
                path: player_cli/__init__.py
              - key: player_cli__auth.py
                path: player_cli/auth.py
              - key: player_cli__ctfconfig_wrapper.py
                path: player_cli/ctfconfig_wrapper.py
              - key: player_cli__exploit____init__.py
                path: player_cli/exploit/__init__.py
              - key: player_cli__exploit__execution.py
                path: player_cli/exploit/execution.py
              - key: player_cli__exploit__exploit.py
                path: player_cli/exploit/exploit.py
              - key: player_cli__exploit__job.py
                path: player_cli/exploit/job.py
              - key: player_cli__exploit__target.py
                path: player_cli/exploit/target.py
              - key: player_cli__flags.py
                path: player_cli/flags.py
              - key: player_cli__service.py
                path: player_cli/service.py
              - key: player_cli__util.py
                path: player_cli/util.py
              - key: templates__python__Dockerfile
                path: templates/python/Dockerfile
              - key: templates__python__exploit.py
                path: templates/python/exploit.py
              - key: templates__python__requirements.txt
                path: templates/python/requirements.txt
              - key: templates__ubuntu__Dockerfile
                path: templates/ubuntu/Dockerfile
              - key: templates__ubuntu__exploit.sh
                path: templates/ubuntu/exploit.sh
          name: ctfcode-cm1
        - name: shared
          persistentVolumeClaim:
            claimName: shared
{{- if (get $openvpn "enabled" | default false) }}
        # OpenVPN configuration volume
        - name: openvpn-config
          secret:
            secretName: openvpn-config
        # TUN device for VPN
        - name: dev-net-tun
          hostPath:
            path: /dev/net/tun
            type: CharDevice
{{- end }}
