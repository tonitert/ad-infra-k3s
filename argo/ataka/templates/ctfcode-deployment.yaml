apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f ../../apps/ataka/docker-compose.yml -c --generate-network-policies
    kompose.version: 1.36.0 (ae2a39403)
  labels:
    io.kompose.service: ctfcode
  name: ctfcode
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: ctfcode
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f ../../apps/ataka/docker-compose.yml -c --generate-network-policies
        kompose.version: 1.36.0 (ae2a39403)
      labels:
        io.kompose.network/ataka-ataka: "true"
        io.kompose.service: ctfcode
    spec:
      containers:
        # Gluetun VPN sidecar container
        - name: gluetun
          image: ghcr.io/qdm12/gluetun # qmcgaw/gluetun
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            capabilities:
              add:
                - NET_ADMIN
          env:
            - name: VPN_SERVICE_PROVIDER
              value: "custom"
            - name: OPENVPN_CUSTOM_CONFIG
              value: "/etc/openvpn/custom/custom.conf"
            - name: FIREWALL_OUTBOUND_SUBNETS
              value: "fd66:777::/32,fd66:666::/32"
          volumeMounts:
            - name: openvpn-config
              mountPath: /etc/openvpn/custom
              readOnly: true
            - name: dev-net-tun
              mountPath: /dev/net/tun
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
        # Main application container
        - envFrom:
            - secretRef:
                name: ataka-env-secret
          image: ghcr.io/tonitert/ad-infra-k3s/ataka-ctfcode:latest
          name: ctfcode
          # Share network with Gluetun sidecar for VPN routing
          securityContext:
            runAsGroup: 966
            runAsUser: 1000
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - mountPath: /ataka/ctfconfig
              name: ctfcode-cm0
              readOnly: true
            - mountPath: /ataka/player-cli
              name: ctfcode-cm1
            - mountPath: /data/shared
              name: shared
      hostname: ataka-ctfcode
      restartPolicy: Always
      volumes:
        - configMap:
            name: ctfcode-cm0
          name: ctfcode-cm0
        - configMap:
            name: ctfcode-cm1
            defaultMode: 0555
          name: ctfcode-cm1
        - name: shared
          persistentVolumeClaim:
            claimName: shared
        # OpenVPN configuration volume
        - name: openvpn-config
          secret:
            secretName: openvpn-config
        # TUN device for VPN
        - name: dev-net-tun
          hostPath:
            path: /dev/net/tun
            type: CharDevice
