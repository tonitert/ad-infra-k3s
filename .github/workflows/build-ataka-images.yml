name: Build Ataka images

on:
  push:
    branches:
      - master
      - feat/add-ataka
    paths:
      - ".dockerignore"
      - ".github/workflows/build-ataka-images.yml"
      - "ataka/**"
  pull_request:
    paths:
      - ".dockerignore"
      - ".github/workflows/build-ataka-images.yml"
      - "ataka/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            dockerfile: ataka/api/Dockerfile
          - service: cli
            dockerfile: ataka/cli/Dockerfile
          - service: ctfcode
            dockerfile: ataka/ctfcode/Dockerfile
          - service: executor
            dockerfile: ataka/executor/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ github.repository }}/ataka-${{ matrix.service }}:latest
            ghcr.io/${{ github.repository }}/ataka-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=ataka-${{ matrix.service }}
          cache-to: type=gha,scope=ataka-${{ matrix.service }},mode=max
