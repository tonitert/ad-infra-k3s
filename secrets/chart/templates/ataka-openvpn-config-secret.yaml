{{- $ataka := .Values.ataka | default dict -}}
{{- $openvpn := get $ataka "openvpn" | default dict -}}
{{- if (get $openvpn "enabled" | default false) }}
apiVersion: v1
kind: Secret
metadata:
  name: openvpn-config
  namespace: ataka
type: Opaque
data:
  vpn.conf: {{ (required "Set ataka.openvpnConfig in secrets/chart/values.yaml" (get $ataka "openvpnConfig") | toString) | b64enc | quote }}
{{- range $name, $content := (get $ataka "openvpnFiles" | default dict) }}
  {{ $name | quote }}: {{ ($content | toString) | b64enc | quote }}
{{- end }}
{{- end }}
