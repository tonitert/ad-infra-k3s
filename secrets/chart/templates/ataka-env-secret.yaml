{{- $ataka := .Values.ataka | default dict -}}
{{- $rabbitmqPassword := (get $ataka "rabbitmqPassword" | default (randAlphaNum 32) | toString) -}}
{{- $basicAuthUsername := (required "Set ataka.basicAuthUsername in secrets/chart/values.yaml" (get $ataka "basicAuthUsername") | toString) -}}
{{- $basicAuthPassword := (required "Set ataka.basicAuthPassword in secrets/chart/values.yaml" (get $ataka "basicAuthPassword") | toString) -}}
{{- $publicUrl := (get $ataka "publicUrl" | default "https://ataka.ad.tertsonen.xyz" | toString) -}}
{{- if not (regexMatch "^[\\x20-\\x7E]+$" $rabbitmqPassword) -}}
{{- fail "ataka.rabbitmqPassword must contain printable ASCII characters only" -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: ataka-env-secret
  namespace: ataka
  labels:
    io.kompose.service: api-env
type: Opaque
data:
  ATAKA_BASIC_AUTH_PASSWORD: {{ $basicAuthPassword | b64enc | quote }}
  ATAKA_BASIC_AUTH_USERNAME: {{ $basicAuthUsername | b64enc | quote }}
  ATAKA_PUBLIC_URL: {{ $publicUrl | b64enc | quote }}
  CTF: {{ (get $ataka "ctf" | default "testctf" | toString) | b64enc | quote }}
  DATA_STORE: {{ (get $ataka "dataStore" | default "/data" | toString) | b64enc | quote }}
  EXPLOIT_CPUSET: {{ (get $ataka "exploitCpuset" | default "" | toString) | b64enc | quote }}
  POSTGRES_PASSWORD: {{ (get $ataka "postgresPassword" | default (randAlphaNum 32) | toString) | b64enc | quote }}
  POSTGRES_USER: {{ (get $ataka "postgresUser" | default "ataka" | toString) | b64enc | quote }}
  PYTHONUNBUFFERED: {{ (get $ataka "pythonUnbuffered" | default "1" | toString) | b64enc | quote }}
  RABBITMQ_PASSWORD: {{ $rabbitmqPassword | b64enc | quote }}
  RABBITMQ_USER: {{ (get $ataka "rabbitmqUser" | default "ataka" | toString) | b64enc | quote }}
  USERID: {{ (get $ataka "userId" | default "1000:966" | toString) | b64enc | quote }}
